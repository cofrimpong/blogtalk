name: Deploy Next.js static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY || secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'AIzaSyArPPUi6oW6_k-yqd6j1QSR4pQ4DPuo9Rs' }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'blogtalk-a1df6.firebaseapp.com' }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID || secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'blogtalk-a1df6' }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID || secrets.NEXT_PUBLIC_FIREBASE_APP_ID || '1:683672804384:web:29ba826a820176fa803045' }}
      NEXT_PUBLIC_OWNER_EMAIL: ${{ vars.NEXT_PUBLIC_OWNER_EMAIL || secrets.NEXT_PUBLIC_OWNER_EMAIL || 'cof@njit.edu' }}
      NEXT_PUBLIC_GITHUB_OWNER: ${{ vars.NEXT_PUBLIC_GITHUB_OWNER || secrets.NEXT_PUBLIC_GITHUB_OWNER || 'cofrimpong' }}
      NEXT_PUBLIC_GITHUB_REPO: ${{ vars.NEXT_PUBLIC_GITHUB_REPO || secrets.NEXT_PUBLIC_GITHUB_REPO || 'blogtalk' }}
      NEXT_PUBLIC_GITHUB_BRANCH: ${{ vars.NEXT_PUBLIC_GITHUB_BRANCH || secrets.NEXT_PUBLIC_GITHUB_BRANCH || 'main' }}
      NEXT_PUBLIC_POSTS_PATH: ${{ vars.NEXT_PUBLIC_POSTS_PATH || secrets.NEXT_PUBLIC_POSTS_PATH || 'content/posts' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Firebase public env
        run: |
          required_keys=(
            NEXT_PUBLIC_FIREBASE_API_KEY
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
            NEXT_PUBLIC_FIREBASE_PROJECT_ID
            NEXT_PUBLIC_FIREBASE_APP_ID
          )

          missing=0
          for key in "${required_keys[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub Actions var/secret: ${key}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
